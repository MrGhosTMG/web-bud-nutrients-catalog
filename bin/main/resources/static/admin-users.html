<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Users</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <span class="header-username">user_name</span>
        <span class="header-title">Welcome to bud's catalog !!!</span>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="container">
        <!-- SIDEBAR MENU -->
        <div class="sidebar">
            <div class="menu-title">MENU</div>
            <div class="menu-items">
                <a href="admin-users.html" class="menu-item active">Users</a>
                <a href="admin-user-wishes.html" class="menu-item">User's wishes</a>
                <a href="#" class="menu-item">Buds</a>
                <a href="#" class="menu-item">Advanced</a>
                <a href="#" class="menu-item">In stock</a>
                <a href="#" class="menu-item">Orders</a>
                <a href="#" class="menu-item">My wishes</a>
                <a href="#" class="menu-item">Win/Loss</a>
                <a href="#" class="menu-item">Catalog edit</a>
                <div class="menu-divider"></div>
                <a href="#" class="menu-item menu-item-special">Browse markets</a>
                <a href="#" class="menu-item menu-item-special">Add market</a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- BREADCRUMBS -->
            <div class="breadcrumbs">
                <span class="breadcrumb-current">Users</span>
                <span class="breadcrumb-separator">=></span>
                <span class="breadcrumb-current">Filters</span>
            </div>

            <div class="content-header">
                <span class="content-title">Users => Filters</span>
                <div class="btn-group">
                    <input type="text" class="search-box" placeholder="A - Z" id="searchBox">
                    <button class="btn btn-primary" onclick="openFilters()">Filters</button>
                </div>
            </div>

            <!-- TABLE -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Wish list</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable">
                        <!-- Content will be populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <button class="action-btn action-btn-edit" onclick="editUser()">Edit</button>
            <button class="action-btn action-btn-info" onclick="showInfo()">Info</button>
            <button class="action-btn action-btn-delete" onclick="deleteUser()">Delete</button>
            <button class="logout-btn">Logout</button>
        </div>
    </div>

    <script src="js/admin-users.js"></script>
</body>
</html>
