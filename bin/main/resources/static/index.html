<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Bud's Catalog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        .welcome-header {
            background-color: white;
            border: 3px solid var(--primary-green);
            padding: 15px 20px;
            margin: 10px;
            text-align: center;
            font-size: 20px;
            width: 100%;
        }

        .welcome-header-username {
            color: var(--light-green);
            font-weight: bold;
        }

        .welcome-header-title {
            color: var(--light-green);
            font-weight: bold;
        }

        .welcome-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .welcome-button {
            background-color: white;
            border: 3px solid var(--primary-green);
            padding: 25px 50px;
            border-radius: 20px;
            font-size: 24px;
            color: var(--light-green);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .welcome-button:hover {
            background-color: var(--light-green);
            color: white;
            transform: scale(1.05);
        }

        .welcome-buttons {
            display: flex;
            gap: 20px;
        }

        .background-image {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: var(--dark-gray);
            font-style: italic;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="welcome-header">
        <span class="welcome-header-username">guest</span>
        <span class="welcome-header-title">Welcome to bud's catalog !!!</span>
    </div>

    <!-- WELCOME CONTENT -->
    <div class="welcome-content">
        <div class="welcome-buttons">
            <a href="login.html" class="welcome-button">Login</a>
            <a href="registration.html" class="welcome-button">Registration</a>
        </div>
        <div class="background-image">Background image</div>
    </div>
</body>
</html>
