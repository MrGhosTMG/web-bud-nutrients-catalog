<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bud's Catalog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        .auth-header {
            background-color: white;
            border: 3px solid var(--primary-green);
            padding: 15px 20px;
            margin: 10px;
            text-align: center;
            font-size: 20px;
            width: 100%;
        }

        .auth-header-username {
            color: var(--light-green);
            font-weight: bold;
        }

        .auth-header-title {
            color: var(--light-green);
            font-weight: bold;
        }

        .auth-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .auth-form {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
        }

        .auth-title {
            text-align: center;
            font-size: 28px;
            color: var(--primary-green);
            font-weight: bold;
            margin-bottom: 30px;
            padding: 15px;
            border: 3px solid var(--primary-green);
            border-radius: 10px;
        }

        .form-section {
            margin-bottom: 20px;
        }

        .form-section-label {
            text-align: center;
            color: var(--light-green);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .auth-input {
            width: 100%;
            padding: 12px 15px;
            border: 3px solid var(--primary-green);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
            color: var(--blue);
        }

        .auth-input::placeholder {
            color: #999;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
        }

        .save-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--blue);
            font-weight: 500;
        }

        .save-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--dark-gray);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .forgot-password:hover {
            color: var(--primary-green);
            text-decoration: underline;
        }

        .error-message {
            color: var(--primary-green);
            text-align: center;
            font-size: 14px;
            margin: 15px 0;
            display: none;
        }

        .auth-button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .auth-btn {
            flex: 1;
            padding: 12px 20px;
            border: 3px solid;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .auth-btn-primary {
            background-color: var(--light-green);
            color: white;
            border-color: var(--light-green);
        }

        .auth-btn-primary:hover {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
        }

        .auth-btn-secondary {
            background-color: white;
            color: var(--dark-gray);
            border-color: var(--dark-gray);
        }

        .auth-btn-secondary:hover {
            background-color: var(--gray);
        }

        .button-icon {
            font-size: 20px;
            margin-right: 8px;
        }

        .registration-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .registration-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="auth-header">
        <span class="auth-header-username">guest</span>
        <span class="auth-header-title">Welcome to bud's catalog !!!</span>
    </div>

    <!-- AUTH CONTENT -->
    <div class="auth-content">
        <div class="auth-form">
            <div class="auth-title">Login</div>

            <div class="form-section">
                <div class="form-section-label">please enter your username or phone number or Email</div>
                <input type="text" class="auth-input" placeholder="your user_name here" id="loginUsername">
            </div>

            <div class="form-section">
                <div class="form-section-label">please enter password</div>
                <input type="password" class="auth-input" placeholder="your password here" id="loginPassword">
            </div>

            <div class="form-footer">
                <label class="save-checkbox">
                    <input type="checkbox" id="rememberMe">
                    <span>Save</span>
                </label>
                <a href="#" class="forgot-password" onclick="forgotPassword(event)">forget you password ?</a>
            </div>

            <div class="error-message" id="errorMessage">Oop's some data is incorrect! Please check</div>

            <div class="auth-button-group">
                <button class="auth-btn auth-btn-primary" onclick="login()">Login</button>
                <a href="registration.html" class="auth-btn auth-btn-secondary registration-link">
                    <span class="registration-icon">📝</span>Go to registration
                </a>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
