<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Wishes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <span class="header-username">user_name</span>
        <span class="header-title">Welcome to bud's catalog !!!</span>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="container">
        <!-- SIDEBAR MENU -->
        <div class="sidebar">
            <div class="menu-title">MENU</div>
            <div class="menu-items">
                <a href="admin-users.html" class="menu-item">Users</a>
                <a href="admin-user-wishes.html" class="menu-item active">User's wishes</a>
                <a href="bud's.html" class="menu-item">Buds</a>
                <a href="advanced.html" class="menu-item">Advanced</a>
                <a href="in-stock.html" class="menu-item">In stock</a>
                <a href="orders.html" class="menu-item">Orders</a>
                <a href="my-wishes.html" class="menu-item">My wishes</a>
                <a href="#" class="menu-item">Win/Loss</a>
                <a href="#" class="menu-item">Catalog edit</a>
                <div class="menu-divider"></div>
                <a href="#" class="menu-item menu-item-special" style="visibility: hidden; pointer-events: none;">Manufacturers</a>
                <a href="#" class="menu-item menu-item-special" style="visibility: hidden; pointer-events: none;">Categories</a>
                <div class="menu-divider" style="visibility: hidden;"></div>
                <a href="#" class="menu-item menu-item-special" style="visibility: hidden; pointer-events: none;">Browse markets</a>
                <a href="#" class="menu-item menu-item-special" style="visibility: hidden; pointer-events: none;">Add market</a>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- BREADCRUMBS -->
            <div class="breadcrumbs">
                <span class="breadcrumb-current" id="breadcrumbFilters">User's wishes (A-Z)</span>
            </div>

            <div class="content-header">
                <span class="content-title">User's wishes</span>
                <div class="btn-group">
                    <div class="search-group">
                        <input type="text" class="search-input" placeholder="Search by bud name..." id="searchInput">
                        <button class="btn btn-search" onclick="applyFilters()">🔍</button>
                    </div>
                    <input type="text" class="search-box" placeholder="A - Z" id="searchBox">
                    <button class="btn btn-primary" onclick="openFiltersModal()">Filters</button>
                </div>
            </div>

            <!-- TABLE HEADER (fixed) -->
            <div class="table-header wishes-table-header">
                <div class="table-header-cell">Bud Name</div>
                <div class="table-header-cell">Photo</div>
                <div class="table-header-cell">Users</div>
                <div class="table-header-cell">Manufacturer</div>
                <div class="table-header-cell">Category</div>
                <div class="table-header-cell">Price</div>
                <div class="table-header-cell" style="text-align: right;">Actions</div>
            </div>

            <!-- TABLE -->
            <div class="table-container">
                <table>
                    <tbody id="wishesTable">
                        <!-- Content will be populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <button class="action-btn action-btn-alerts action-btn-alerts-inactive" onclick="showAlerts()">
                <span class="alerts-badge" id="alertsBadge" style="display: none;">0</span>
                Alerts
            </button>
            <button class="action-btn action-btn-info" onclick="showInfo()">Info</button>
            <button class="action-btn action-btn-check" onclick="checkInStock()">Check in stock</button>
            <button class="action-btn action-btn-add" onclick="addToOrders()">Add to orders</button>
            <button class="action-btn action-btn-delete" onclick="removeFromWishlist()">Remove from wishlist</button>

            <!-- Dynamic content area -->
            <div id="rightPanelContent"></div>

            <button class="logout-btn">Logout</button>
        </div>
    </div>

    <script src="js/admin-wishlist.js"></script>
</body>
</html>
