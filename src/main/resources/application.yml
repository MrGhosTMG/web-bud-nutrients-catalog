server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/buds_app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd

app:
  jwt:
    secret: BudsAppSecretKeyForJWTTokenGeneration2024MustBeAtLeast256BitsLong
    expiration-ms: 86400000

file:
  upload-dir: uploads/photos
